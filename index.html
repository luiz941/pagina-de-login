<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pagina de login</title>
</head>
<body>
    
    <main>
        <section class="conteudo-principal">
            <div class="div-principal">
                <h1 class="titulo-principal">Faça login no site</h1>

                <form class="formulario-princial">
                    <label class="descricao-input" for="email">Nome de usuário ou endereço de email</label>
                    <input class="campo-usuario" type="email" id="email" name="email">
                    
                    <label class="descricao-input" for="senha">Senha</label>
                    <input class="campo-usuario" type="password" id="senha" name="senha">
                    
                    <button class="botao-formulario" class="botao-entrar">Entrar</button>
                </form>
            </div>
            <div class="separador">
                <div class="line"></div>
                <span>OU</span>
                <div class="line"></div>
            </div>
            <div class="botoes-rapidos">
                <button class="botao-rapido"><img class="imagem-botao" src="assets/google.svg" alt="">Google</button>
                <button class="botao-rapido"><img class="imagem-botao" src="assets/github.svg" alt="">Github</button>  
            </div>
            <footer>
                <p class="rodape">É novo no site? <a href="cadastro.html">Criar uma conta</a></p>
            </footer>
        </section>
    </main>

</body>
</html>
